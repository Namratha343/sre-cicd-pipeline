apiVersion: v1
kind: Service
metadata:
  name: sre-cicd-pipeline
  namespace: sre-cicd
  labels:
    app: sre-cicd-pipeline
spec:
  type: NodePort
  selector:
    app: sre-cicd-pipeline
  ports:
    - name: http
      protocol: TCP
      port: 80          
      targetPort: 5001 
      nodePort: 30080 
